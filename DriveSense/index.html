<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveSense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚗 DriveSense</h1>

        <button id="toggleDrive">Driving Mode: OFF</button>

        <div class="call-section">
            <h2>Incoming Call</h2>
            <p id="caller">Caller: Unknown</p>
            <button onclick="incomingCall()">📞 Simulate Call</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
